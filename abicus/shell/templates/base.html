<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Abicus{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/shell/static/img/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+Pro:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="/shell/static/css/tokens.css?v={{ asset_v }}">
  <link rel="stylesheet" href="/shell/static/css/shell.css?v={{ asset_v }}">
  <link rel="stylesheet" href="/shell/static/css/components.css?v={{ asset_v }}">
  {% block head %}{% endblock %}
</head>
<body data-active="{{ active }}">
  {% include "_sidebar.html" %}
  <main class="content">
    <header class="page-header">
      <div class="page-header__title">
        <div class="breadcrumb">{% block breadcrumb %}{% endblock %}</div>
        <h1>{% block page_title %}{% endblock %}</h1>
      </div>
      <div class="page-actions">
        {% block page_actions %}{% endblock %}
        <span class="version-chip" title="Abicus build">{{ version }}</span>
      </div>
    </header>
    <section class="page-body">
      {% block content %}{% endblock %}
    </section>
  </main>
  <div id="toasts" class="toasts"></div>
  <script src="/shell/static/js/api.js?v={{ asset_v }}"></script>
  <script src="/shell/static/js/shell.js?v={{ asset_v }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
